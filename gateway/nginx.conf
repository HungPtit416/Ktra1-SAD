events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;

        location = / {
            try_files /index.html =404;
        }

        location = /demo {
            try_files /ai-advisor-demo.html =404;
        }

        location = /test-chatbot {
            try_files /test-chatbot.html =404;
        }

        location = /kb-viewer {
            try_files /kb-viewer.html =404;
        }

        location /customer-ui/ {
            try_files /customer-home.html =404;
        }

        location = /customer-ui/login/ {
            try_files /customer-login.html =404;
        }

        location = /customer-ui/register/ {
            try_files /customer-register.html =404;
        }

        location = /customer-ui/cart/ {
            try_files /customer-cart.html =404;
        }

        location = /customer-ui/orders/ {
            try_files /customer-orders.html =404;
        }

        location ~ ^/customer-ui/products/(laptop|mobile)/[0-9]+/?$ {
            try_files /customer-detail.html =404;
        }

        location /staff-ui/ {
            try_files /staff-dashboard.html =404;
        }

        location = /staff-ui/login/ {
            try_files /staff-login.html =404;
        }

        location = /staff-ui/products/form/ {
            try_files /staff-product-form.html =404;
        }

        location /customer/ {
            proxy_pass http://customer-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /cart/ {
            proxy_pass http://cart-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /order/ {
            proxy_pass http://order-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /staff/ {
            proxy_pass http://staff-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /laptops/ {
            proxy_pass http://laptop-service:8000/api/laptops/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /mobiles/ {
            proxy_pass http://mobile-service:8000/api/mobiles/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/advisor/ {
            proxy_pass http://advisor-service:8003/api/advisor/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_buffering off;
        }

        location /assets/ {
            try_files $uri =404;
        }
    }
}
