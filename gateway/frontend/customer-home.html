<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer | Shopping</title>
  <link rel="stylesheet" href="/assets/main.css?v=20260324c" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="logo" href="/">ElecStore</a>
      <form class="search" method="get" action="/customer-ui/">
        <input id="customer-search-input" name="q" placeholder="Search products..." />
        <button class="btn primary" type="submit">Search</button>
      </form>
      <nav class="nav">
        <span class="pill" id="customer-token-pill">Not logged in</span>
        <a class="btn ghost" href="/customer-ui/login/">Login</a>
        <a class="btn ghost" href="/customer-ui/register/">Register</a>
        <a class="btn ghost" href="/customer-ui/orders/">Orders</a>
        <a class="btn ghost" href="/customer-ui/cart/">Cart</a>
        <button class="btn danger" id="customer-logout-btn" type="button" style="display:none;">Logout</button>
      </nav>
    </header>

    <!-- <section class="hero">
      <h1>Customer Home</h1>
      <p>Danh sach san pham laptop + mobile theo card layout, co phan trang va route chi tiet.</p>
    </section> -->

    <section id="customer-grid" class="grid products" aria-live="polite"></section>
    <nav id="customer-pager" class="pagination"></nav>
  </main>

  <script src="/assets/app.js?v=20260324c"></script>
  <script>
    UI.mountCustomerHome();
  </script>

  <!-- Ensure Main Page doesn't hide chatbot and prevent shadow from blocking interactions -->
  <style>
    body {
      position: relative;
    }
    main.page {
      position: relative;
      z-index: 1;
    }
    #ai-advisor-frame {
      visibility: visible !important;
      display: block !important;
      opacity: 1 !important;
      pointer-events: auto !important;
    }
  </style>

  <!-- 🤖 AI Advisor Chatbot -->
  <iframe 
    id="ai-advisor-frame"
    src="/ai-advisor.html" 
    style="position: fixed; 
           right: 20px; 
           bottom: 20px; 
           width: 430px; 
           height: 600px; 
           border: none; 
           border-radius: 12px; 
           z-index: 99999;
           box-shadow: none;
           background: white;
           pointer-events: auto;"
    allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
  </iframe>
</body>
</html>
