<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff | Dashboard</title>
  <link rel="stylesheet" href="/assets/main.css?v=20260324c" />
  <style>
    .staff-layout { margin-top: 1rem; display: grid; grid-template-columns: 260px 1fr; gap: 0.9rem; }
    .sidebar-link { display:block; border:1px solid #dee7ee; background:#f4f8fc; border-radius:10px; padding:0.52rem 0.64rem; text-decoration:none; font-weight:700; margin-bottom:0.5rem; }
    .sidebar-link.on { border-color:#d8bbb0; background:#f8ece7; color:#8b3115; }
    @media (max-width:980px){ .staff-layout{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="logo" href="/staff-ui/">ElecStore Staff</a>
      <nav class="nav">
        <span class="pill" id="staff-token-pill">Not logged in</span>
        <a class="btn ghost" href="/staff-ui/login/">Login</a>
        <a class="btn ghost" href="/staff-ui/products/form/">Add Product</a>
        <button class="btn danger" id="staff-logout-btn" type="button" style="display:none;">Logout</button>
      </nav>
    </header>

    <section class="staff-layout">
      <aside class="card panel">
        <h3>Menu</h3>
        <a data-staff-menu="laptop" class="sidebar-link" href="/staff-ui/?type=laptop">Manage Laptops</a>
        <a data-staff-menu="mobile" class="sidebar-link" href="/staff-ui/?type=mobile">Manage Mobile Phones</a>
        <a class="sidebar-link" href="/staff-ui/products/form/">Add / Edit Product</a>
      </aside>

      <article class="card panel">
        <div class="actions" style="justify-content:space-between;">
          <h1 style="margin:0;">Products</h1>
          <button class="btn secondary" id="staff-reload-btn" type="button">Refresh</button>
        </div>
        <div class="table-wrap" style="margin-top:0.7rem;">
          <table>
            <thead>
              <tr><th>Name</th><th>Price</th><th>Brand</th><th>Stock</th><th>Action</th></tr>
            </thead>
            <tbody id="staff-products-tbody"><tr><td colspan="5">Loading...</td></tr></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <script src="/assets/app.js?v=20260324c"></script>
  <script>
    UI.mountStaffDashboard();
  </script>
</body>
</html>
