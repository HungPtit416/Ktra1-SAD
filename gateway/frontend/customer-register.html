<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer | Register</title>
  <link rel="stylesheet" href="/assets/main.css?v=20260324c" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="logo" href="/customer-ui/">ElecStore</a>
      <nav class="nav">
        <span class="pill" id="customer-token-pill">Not logged in</span>
        <a class="btn ghost" href="/customer-ui/login/">Login</a>
        <button class="btn danger" id="customer-logout-btn" type="button" style="display:none;">Logout</button>
      </nav>
    </header>

    <section class="card panel" style="margin-top:1rem; max-width:760px;">
      <h1>Create New Account</h1>
      <form id="customer-register-form">
        <div class="row one"><input id="customer-register-name" placeholder="Full Name" required /></div>
        <div class="row one"><input id="customer-register-email" type="email" placeholder="Email" required /></div>
        <div class="row one"><input id="customer-register-password" type="password" placeholder="Password" required /></div>
        <div class="row one"><input id="customer-register-confirm" type="password" placeholder="Confirm Password" required /></div>
        <div class="actions">
          <button class="btn primary" type="submit">Register</button>
          <a class="btn ghost" href="/customer-ui/login/">Already have account?</a>
        </div>
      </form>
      <p id="customer-register-output" style="display:none;"></p>
    </section>
  </main>

  <script src="/assets/app.js?v=20260324c"></script>
  <script>
    UI.renderCustomerTokenPill('customer-token-pill');
    UI.bindCustomerAuth();
  </script>
</body>
</html>
