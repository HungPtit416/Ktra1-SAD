<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff | Product Form</title>
  <link rel="stylesheet" href="/assets/main.css?v=20260324c" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <a class="logo" href="/staff-ui/">ElecStore Staff</a>
      <nav class="nav">
        <span class="pill" id="staff-token-pill">Not logged in</span>
        <a class="btn ghost" href="/staff-ui/">Dashboard</a>
        <button class="btn danger" id="staff-logout-btn" type="button" style="display:none;">Logout</button>
      </nav>
    </header>

    <section class="card panel" style="margin-top:1rem; max-width:800px;">
      <h1>Add / Edit Product</h1>
      <form id="staff-form">
        <div class="row">
          <select id="staff-product-type"><option value="laptop">Laptop</option><option value="mobile">Mobile Phone</option></select>
          <input id="staff-product-id" type="number" min="1" placeholder="Product ID (for edit/delete)" />
        </div>
        <div class="row" style="grid-template-columns: 2fr 1fr;">
          <input id="staff-name" placeholder="Product Name" />
          <input id="staff-price" type="number" step="0.01" placeholder="Price" />
        </div>
        <div class="row" style="grid-template-columns: 2fr 1fr;">
          <input id="staff-brand" placeholder="Brand" />
          <input id="staff-stock" type="number" min="0" placeholder="Stock" />
        </div>
        <div class="row one">
          <textarea id="staff-specs" rows="4" placeholder="Specifications"></textarea>
        </div>
        <div class="actions">
          <button class="btn secondary" type="button" id="staff-add-btn">Add Product</button>
          <button class="btn primary" type="button" id="staff-edit-btn">Update</button>
          <button class="btn danger" type="button" id="staff-delete-btn">Delete</button>
        </div>
        <p id="staff-form-output" style="display:none;"></p>
      </form>
    </section>
  </main>

  <script src="/assets/app.js?v=20260324c"></script>
  <script>
    UI.mountStaffForm();
  </script>
</body>
</html>
